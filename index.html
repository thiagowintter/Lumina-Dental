<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      try {
        // Prevent "Cannot set property fetch of #<Window> which has only a getter"
        // This stops browser extensions or third-party polyfills from crashing the app
        const desc = Object.getOwnPropertyDescriptor(window, 'fetch');
        if (desc && !desc.set) {
          Object.defineProperty(window, 'fetch', {
            get: desc.get || (() => window.fetch),
            set: function(v) { console.warn('Intercepted set window.fetch'); },
            configurable: true,
            enumerable: true
          });
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
